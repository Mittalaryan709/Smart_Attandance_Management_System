<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mark Attendance — SmartAttend</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--neon-cyan:#00fff7;--neon-pink:#ff00e5;--dark:#020810;--text:#c8e6ff;}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:var(--dark);font-family:'Rajdhani',sans-serif;color:var(--text);}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,247,0.03) 1px,transparent 1px);background-size:60px 60px;animation:gridMove 20s linear infinite;pointer-events:none;z-index:0;}
@keyframes gridMove{0%{background-position:0 0;}100%{background-position:60px 60px;}}
.glow-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);opacity:0.1;}
.glow-orb.cyan{width:500px;height:500px;background:var(--neon-cyan);top:-100px;left:50%;transform:translateX(-50%);}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:1;}
.corner{position:fixed;width:50px;height:50px;z-index:2;opacity:0.3;}
.corner.tl{top:16px;left:16px;border-top:2px solid var(--neon-cyan);border-left:2px solid var(--neon-cyan);}
.corner.tr{top:16px;right:16px;border-top:2px solid var(--neon-cyan);border-right:2px solid var(--neon-cyan);}
.corner.bl{bottom:16px;left:16px;border-bottom:2px solid var(--neon-cyan);border-left:2px solid var(--neon-cyan);}
.corner.br{bottom:16px;right:16px;border-bottom:2px solid var(--neon-cyan);border-right:2px solid var(--neon-cyan);}

.page{position:relative;z-index:2;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px;}

.top-bar{display:flex;align-items:center;justify-content:space-between;width:min(960px,95vw);}
.back-btn{display:inline-flex;align-items:center;gap:8px;font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(0,255,247,0.5);letter-spacing:2px;text-decoration:none;text-transform:uppercase;transition:color 0.2s;}
.back-btn:hover{color:var(--neon-cyan);}
.back-btn svg{width:14px;height:14px;stroke:currentColor;}
.page-title{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,var(--neon-cyan),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.live-badge{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(0,255,100,0.7);letter-spacing:2px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#00ff64;animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

.main-layout{display:flex;gap:24px;align-items:flex-start;width:min(960px,95vw);}

/* Camera */
.camera-panel{flex:1;background:rgba(5,15,30,0.8);border:1px solid rgba(0,255,247,0.2);border-radius:16px;overflow:hidden;position:relative;}
.camera-feed{width:100%;display:block;aspect-ratio:4/3;object-fit:cover;}
.scan-overlay{position:absolute;inset:0;pointer-events:none;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--neon-cyan),transparent);opacity:0.6;animation:scanLine 3s ease-in-out infinite;}
@keyframes scanLine{0%{top:0;opacity:0;}10%{opacity:0.6;}90%{opacity:0.6;}100%{top:100%;opacity:0;}}
.corner-bracket{position:absolute;width:30px;height:30px;}
.corner-bracket.tl{top:16px;left:16px;border-top:2px solid var(--neon-cyan);border-left:2px solid var(--neon-cyan);}
.corner-bracket.tr{top:16px;right:16px;border-top:2px solid var(--neon-cyan);border-right:2px solid var(--neon-cyan);}
.corner-bracket.bl{bottom:16px;left:16px;border-bottom:2px solid var(--neon-cyan);border-left:2px solid var(--neon-cyan);}
.corner-bracket.br{bottom:16px;right:16px;border-bottom:2px solid var(--neon-cyan);border-right:2px solid var(--neon-cyan);}
.cam-status{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);border:1px solid rgba(0,255,247,0.3);border-radius:20px;padding:4px 14px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--neon-cyan);letter-spacing:2px;display:flex;align-items:center;gap:6px;}

/* Right panel */
.controls-panel{width:280px;display:flex;flex-direction:column;gap:14px;}

.form-card{
  background:rgba(5,15,30,0.85);
  border:1px solid rgba(0,255,247,0.2);
  border-radius:12px;padding:20px;
  backdrop-filter:blur(10px);
  display:flex;flex-direction:column;gap:14px;
}
.form-card-title{
  font-family:'Orbitron',monospace;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;
  color:rgba(0,255,247,0.5);
  padding-bottom:10px;
  border-bottom:1px solid rgba(0,255,247,0.1);
}
.field{display:flex;flex-direction:column;gap:5px;}
label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,255,247,0.5);}
input{
  background:rgba(0,255,247,0.03);
  border:1px solid rgba(0,255,247,0.15);
  border-radius:8px;padding:10px 14px;
  font-family:'Rajdhani',sans-serif;font-size:14px;
  color:var(--text);outline:none;transition:all 0.2s;width:100%;
}
input:focus{border-color:rgba(0,255,247,0.5);background:rgba(0,255,247,0.06);box-shadow:0 0 16px rgba(0,255,247,0.08);}
input::placeholder{color:rgba(200,230,255,0.2);}

.status-card{background:rgba(5,15,30,0.8);border:1px solid rgba(0,255,100,0.2);border-radius:12px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.status-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,230,255,0.3);}
.status-val{font-family:'Orbitron',monospace;font-size:13px;color:#00ff64;letter-spacing:2px;}

.scan-btn{
  width:100%;background:rgba(0,255,247,0.08);
  border:1px solid rgba(0,255,247,0.5);border-radius:12px;padding:16px;
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--neon-cyan);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all 0.3s;box-shadow:0 0 20px rgba(0,255,247,0.08);
  text-decoration:none;border:1px solid rgba(0,255,247,0.5);
}
.scan-btn svg{width:16px;height:16px;stroke:currentColor;flex-shrink:0;}
.scan-btn:hover{background:rgba(0,255,247,0.15);box-shadow:0 0 40px rgba(0,255,247,0.2);transform:translateY(-2px);}
.scan-btn:active{transform:scale(0.97);}

.hint{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(200,230,255,0.2);letter-spacing:1px;text-align:center;line-height:1.8;}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow-orb cyan"></div>
<div class="scanlines"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="page">
  <div class="top-bar">
    <a href="/" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
    <div class="page-title">Face Scanner</div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>

  <div class="main-layout">
    <!-- Camera Feed -->
    <div class="camera-panel">
      <img src="/video_feed" class="camera-feed" alt="Camera Feed"/>
      <div class="scan-overlay">
        <div class="scan-line"></div>
        <div class="corner-bracket tl"></div>
        <div class="corner-bracket tr"></div>
        <div class="corner-bracket bl"></div>
        <div class="corner-bracket br"></div>
      </div>
      <div class="cam-status"><div class="live-dot"></div>LIVE FEED</div>
    </div>

    <!-- Controls -->
    <div class="controls-panel">

      <!-- ✅ Subject & Department input -->
      <div class="form-card">
        <div class="form-card-title">Session Details</div>
        <div class="field">
          <label>Subject</label>
          <input type="text" id="subjectInput" placeholder="e.g. Mathematics" value="{{ subject }}"/>
        </div>
        <div class="field">
          <label>Department</label>
          <input type="text" id="deptInput" placeholder="e.g. CSE" value="{{ department }}"/>
        </div>
      </div>

      <!-- Status -->
      <div class="status-card">
        <div class="status-label">Camera Status</div>
        <div class="status-val">READY</div>
      </div>

      <!-- Scan button -->
      <a href="#" class="scan-btn" onclick="startScan(event)">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        Capture &amp; Mark
      </a>

      <div class="hint">Fill subject &amp; department<br/>position face in frame<br/>then press Capture</div>
    </div>
  </div>
</div>

<script>
function startScan(e) {
  e.preventDefault();
  const subject = document.getElementById('subjectInput').value.trim() || 'General';
  const dept = document.getElementById('deptInput').value.trim() || 'General';
  window.location.href = '/mark_attendance?subject=' + encodeURIComponent(subject) + '&department=' + encodeURIComponent(dept);
}
</script>
</body>
</html>
